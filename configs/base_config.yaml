# Base configurations for chunking, embedding model, and retrieval
embedding:
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  dimension: 384

chunking:
  chunk_size: 500
  chunk_overlap: 50

retrieval:
  top_k: 5
  # pre_rerank_k: number of candidates fetched from Qdrant before reranking.
  # Should be top_k * 4 to give the reranker enough candidates to filter.
  pre_rerank_k: 20
  score_threshold: 0.65

# Reranker configuration (PROPOSAL.md Section 5.2C)
# Model: BAAI/bge-reranker-base — multilingual Cross-Encoder, ~250MB
# Set enabled: false to run the baseline (no reranker) for ablation study.
reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-base"

# Hallucination Reduction (PROPOSAL.md Section 5.2E)
# Controls abstention, self-verification, and confidence indicators.
# Set enabled: false to disable all hallucination reduction for ablation study.
hallucination_reduction:
  enabled: true

  # Abstention: refuse to answer when best retrieval score is below this threshold
  abstention_threshold: 0.55

  # Confidence levels displayed in the UI
  confidence_levels:
    high: 0.80    # score >= 0.80 → 🟢 Độ tin cậy cao
    medium: 0.65  # score >= 0.65 → 🟡 Nên xác nhận thêm
    # score < 0.65 → 🔴 Thấp (nhưng above abstention_threshold)

  # Self-verification: LLM double-checks its answer against the retrieved context
  # Costs 1 extra API call per query. Set false to save tokens.
  self_verification: true
